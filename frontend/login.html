<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Lens AI - Authentication</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(20,184,166,0.04) 25%, rgba(20,184,166,0.04) 26%, transparent 27%, transparent 74%, rgba(20,184,166,0.04) 75%, rgba(20,184,166,0.04) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(20,184,166,0.04) 25%, rgba(20,184,166,0.04) 26%, transparent 27%, transparent 74%, rgba(20,184,166,0.04) 75%, rgba(20,184,166,0.04) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            z-index: 1; pointer-events: none;
            animation: gridFloat 20s linear infinite;
        }
        @keyframes gridFloat { 0%{transform:translateY(0)} 100%{transform:translateY(50px)} }

        body::after {
            content: '';
            position: fixed; top: -50%; right: -50%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(20,184,166,0.08) 0%, transparent 70%);
            border-radius: 50%; z-index: 0;
            animation: float 15s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-50px)} }

        .auth-container {
            width: 100%; max-width: 460px;
            z-index: 10; position: relative; padding: 20px;
        }

        .auth-card {
            background: rgba(20, 28, 50, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(20, 184, 166, 0.2);
            border-radius: 20px;
            padding: 45px 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 60px rgba(20,184,166,0.05);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

        .auth-header { text-align: center; margin-bottom: 35px; }

        .auth-logo {
            width: 56px; height: 56px;
            background: rgba(20,184,166,0.15);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid rgba(20,184,166,0.25);
        }
        .auth-logo svg {
            width: 28px; height: 28px;
            stroke: #14b8a6; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        .auth-title {
            font-size: 2rem; color: #fff; margin-bottom: 8px;
            background: linear-gradient(135deg, #14b8a6 0%, #5eead4 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .auth-subtitle { font-size: 0.95rem; color: #a0aec0; }

        /* Tab switcher */
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.04);
            border-radius: 12px; padding: 4px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .auth-tab {
            flex: 1; padding: 12px 20px; border: none;
            background: transparent; color: #718096;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer; border-radius: 10px;
            transition: all 0.3s ease;
        }
        .auth-tab.active {
            background: rgba(20,184,166,0.15);
            color: #14b8a6;
            box-shadow: 0 2px 8px rgba(20,184,166,0.15);
        }
        .auth-tab:hover:not(.active) { color: #a0aec0; }

        /* Forms */
        .auth-form { display: none; }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; color: #cbd5e0;
            font-size: 0.9rem; margin-bottom: 8px; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(20,184,166,0.2);
            border-radius: 10px; color: #fff; font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            background: rgba(255,255,255,0.08);
            border-color: #14b8a6;
            box-shadow: 0 0 20px rgba(20,184,166,0.15);
        }
        .form-group input::placeholder { color: #4a5568; }
        .form-hint { font-size: 0.8rem; color: #4a5568; margin-top: 6px; }

        .auth-button {
            width: 100%; padding: 14px 20px;
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
            color: #fff; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            margin-top: 10px; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(20,184,166,0.25);
        }
        .auth-button:hover {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(20,184,166,0.35);
        }
        .auth-button:active { transform: translateY(0); }
        .auth-button.loading { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Messages */
        .message {
            padding: 12px 16px; border-radius: 8px;
            margin-bottom: 20px; display: none;
            font-size: 0.9rem;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
        .message.show { display: block; }
        .message.error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.4); color: #fca5a5;
        }
        .message.success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.4); color: #86efac;
        }

        /* Password requirements */
        .password-requirements {
            margin-top: 12px; padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .password-requirements p { font-size: 0.8rem; color: #4a5568; margin-bottom: 6px; font-weight: 500; }
        .req-item {
            font-size: 0.8rem; color: #4a5568; margin: 4px 0;
            display: flex; align-items: center; gap: 6px;
            transition: color 0.2s ease;
        }
        .req-item.met { color: #34d399; }
        .req-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #4a5568; transition: background 0.2s ease; flex-shrink: 0;
        }
        .req-item.met .req-dot { background: #34d399; }

        .back-link { text-align: center; margin-top: 25px; }
        .back-link a {
            color: #718096; text-decoration: none; font-size: 0.9rem;
            transition: color 0.2s ease;
        }
        .back-link a:hover { color: #14b8a6; }

        @media (max-width: 480px) {
            .auth-card { padding: 35px 25px; }
            .auth-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        <path d="M9 12l2 2 4-4"/>
                    </svg>
                </div>
                <h1 class="auth-title">Secure Lens AI</h1>
                <p class="auth-subtitle">Cybersecurity Log Analysis Platform</p>
            </div>

            <div id="message" class="message"></div>

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-button" id="login-btn">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username" required autocomplete="username" oninput="validateRegisterForm()">
                    <div class="form-hint">At least 3 characters</div>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password" required autocomplete="new-password" oninput="validateRegisterForm()">
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" placeholder="Confirm your password" required autocomplete="new-password" oninput="validateRegisterForm()">
                </div>
                <div class="password-requirements" id="pw-reqs">
                    <p>Password must have:</p>
                    <div class="req-item" id="req-length"><span class="req-dot"></span> At least 6 characters</div>
                    <div class="req-item" id="req-match"><span class="req-dot"></span> Passwords match</div>
                </div>
                <button type="submit" class="auth-button" id="register-btn">Create Account</button>
            </form>

            <div class="back-link">
                <a href="index.html">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // Auto-detect API URL: use localhost in development, relative path in production
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
          ? 'http://localhost:5000/api'
          : (window.SECURE_LENS_API_URL || `${window.location.origin}/api`);

        // Redirect if already logged in
        (function() {
            const token = localStorage.getItem('seculens_token');
            if (token) window.location.href = '/analysis.html';
        })();

        function switchTab(tab) {
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('login-form').classList.toggle('active', tab === 'login');
            document.getElementById('register-form').classList.toggle('active', tab === 'register');
            hideMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message show ' + type;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        function setButtonLoading(btn, loading, originalText) {
            btn.classList.toggle('loading', loading);
            btn.disabled = loading;
            btn.textContent = loading ? 'Please wait...' : originalText;
        }

        function validateRegisterForm() {
            const pw = document.getElementById('reg-password').value;
            const cf = document.getElementById('reg-confirm').value;
            document.getElementById('req-length').classList.toggle('met', pw.length >= 6);
            document.getElementById('req-match').classList.toggle('met', pw.length > 0 && cf.length > 0 && pw === cf);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');

            if (!username || !password) { showMessage('Please enter both username and password.', 'error'); return; }

            setButtonLoading(btn, true);
            hideMessage();

            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.access_token) {
                    localStorage.setItem('seculens_token', data.access_token);
                    localStorage.setItem('seculens_user', JSON.stringify(data.user));
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/analysis.html'; }, 1000);
                } else {
                    showMessage(data.error || 'Invalid credentials.', 'error');
                    setButtonLoading(btn, false, 'Sign In');
                }
            } catch (err) {
                console.error('Login error:', err);
                showMessage('Cannot connect to server. Make sure the backend is running on port 5000.', 'error');
                setButtonLoading(btn, false, 'Sign In');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const btn = document.getElementById('register-btn');

            if (!username || !password || !confirm) { showMessage('Please fill in all fields.', 'error'); return; }
            if (username.length < 3) { showMessage('Username must be at least 3 characters.', 'error'); return; }
            if (password.length < 6) { showMessage('Password must be at least 6 characters.', 'error'); return; }
            if (password !== confirm) { showMessage('Passwords do not match.', 'error'); return; }

            setButtonLoading(btn, true);
            hideMessage();

            try {
                const res = await fetch(API_BASE + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    showMessage('Account created successfully! You can now sign in.', 'success');
                    setButtonLoading(btn, false, 'Create Account');
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-username').value = username;
                        document.getElementById('login-password').focus();
                    }, 1500);
                } else {
                    showMessage(data.error || 'Registration failed.', 'error');
                    setButtonLoading(btn, false, 'Create Account');
                }
            } catch (err) {
                console.error('Register error:', err);
                showMessage('Cannot connect to server. Make sure the backend is running on port 5000.', 'error');
                setButtonLoading(btn, false, 'Create Account');
            }
        }
    </script>
</body>
</html>
